name: Main Apply

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: main-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-scope:
    name: Validate Scope
    runs-on: ubuntu-latest
    env:
      DEPLOY_ACCOUNT_SCOPE: ${{ vars.DEPLOY_ACCOUNT_SCOPE }}
    steps:
      - name: Validate DEPLOY_ACCOUNT_SCOPE
        shell: bash
        run: |
          set -euo pipefail
          scope_raw="${DEPLOY_ACCOUNT_SCOPE:-both}"
          scope="$(echo "${scope_raw}" | tr '[:upper:]' '[:lower:]')"
          case "${scope}" in
            1|2|both) ;;
            *)
              echo "Invalid DEPLOY_ACCOUNT_SCOPE: ${scope_raw}. Allowed values: 1, 2, both." >&2
              exit 1
              ;;
          esac

  apply:
    needs: validate-scope
    name: Apply (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: playground
            account: "1"
          - environment: nprod
            account: "1"
          - environment: pre-prod
            account: "2"
          - environment: prod
            account: "2"

    environment: ${{ matrix.environment }}

    env:
      AWS_REGION: eu-central-1
      AWS_ACCOUNT_ID_ACCOUNT1: ${{ secrets.AWS_ACCOUNT_ID_ACCOUNT1 }}
      AWS_ACCOUNT_ID_ACCOUNT2: ${{ secrets.AWS_ACCOUNT_ID_ACCOUNT2 }}
      AWS_GITHUB_ROLE_NAME: ${{ secrets.AWS_GITHUB_ROLE_NAME }}
      DEPLOY_ACCOUNT_SCOPE: ${{ vars.DEPLOY_ACCOUNT_SCOPE }}
      TG_STATE_KMS_KEY_ARN_PLAYGROUND: ${{ secrets.TG_STATE_KMS_KEY_ARN_PLAYGROUND }}
      TG_STATE_KMS_KEY_ARN_NPROD: ${{ secrets.TG_STATE_KMS_KEY_ARN_NPROD }}
      TG_STATE_KMS_KEY_ARN_PRE_PROD: ${{ secrets.TG_STATE_KMS_KEY_ARN_PRE_PROD }}
      TG_STATE_KMS_KEY_ARN_PROD: ${{ secrets.TG_STATE_KMS_KEY_ARN_PROD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target account
        shell: bash
        run: |
          set -euo pipefail
          env_kms_key_arn=""

          case "${{ matrix.account }}" in
            1)
              account_id="${AWS_ACCOUNT_ID_ACCOUNT1:-}"
              ;;
            2)
              account_id="${AWS_ACCOUNT_ID_ACCOUNT2:-}"
              ;;
            *)
              echo "Unsupported account mapping: ${{ matrix.account }}" >&2
              exit 1
              ;;
          esac

          if [[ -z "${AWS_GITHUB_ROLE_NAME}" ]]; then
            echo "Missing required repository secret: AWS_GITHUB_ROLE_NAME" >&2
            exit 1
          fi

          if [[ -z "${account_id}" ]]; then
            if [[ "${{ matrix.account }}" == "1" ]]; then
              echo "Missing required repository secret for account 1 environments: AWS_ACCOUNT_ID_ACCOUNT1" >&2
            else
              echo "Missing required repository secret for account 2 environments: AWS_ACCOUNT_ID_ACCOUNT2" >&2
            fi
            exit 1
          fi

          case "${{ matrix.environment }}" in
            playground) env_kms_key_arn="${TG_STATE_KMS_KEY_ARN_PLAYGROUND:-}" ;;
            nprod) env_kms_key_arn="${TG_STATE_KMS_KEY_ARN_NPROD:-}" ;;
            pre-prod) env_kms_key_arn="${TG_STATE_KMS_KEY_ARN_PRE_PROD:-}" ;;
            prod) env_kms_key_arn="${TG_STATE_KMS_KEY_ARN_PROD:-}" ;;
          esac

          if [[ -z "${env_kms_key_arn}" ]]; then
            case "${{ matrix.environment }}" in
              playground) missing_secret="TG_STATE_KMS_KEY_ARN_PLAYGROUND" ;;
              nprod) missing_secret="TG_STATE_KMS_KEY_ARN_NPROD" ;;
              pre-prod) missing_secret="TG_STATE_KMS_KEY_ARN_PRE_PROD" ;;
              prod) missing_secret="TG_STATE_KMS_KEY_ARN_PROD" ;;
            esac
            echo "Missing required repository secret for ${{ matrix.environment }}: ${missing_secret}" >&2
            exit 1
          fi

          echo "AWS_ACCOUNT_ID=${account_id}" >> "$GITHUB_ENV"
          echo "AWS_ROLE_TO_ASSUME=arn:aws:iam::${account_id}:role/${AWS_GITHUB_ROLE_NAME}" >> "$GITHUB_ENV"
          echo "TG_AWS_ACCOUNT_ID_ACCOUNT1=${AWS_ACCOUNT_ID_ACCOUNT1:-}" >> "$GITHUB_ENV"
          echo "TG_AWS_ACCOUNT_ID_ACCOUNT2=${AWS_ACCOUNT_ID_ACCOUNT2:-}" >> "$GITHUB_ENV"
          echo "TG_STATE_KMS_KEY_ARN_PLAYGROUND=${TG_STATE_KMS_KEY_ARN_PLAYGROUND:-}" >> "$GITHUB_ENV"
          echo "TG_STATE_KMS_KEY_ARN_NPROD=${TG_STATE_KMS_KEY_ARN_NPROD:-}" >> "$GITHUB_ENV"
          echo "TG_STATE_KMS_KEY_ARN_PRE_PROD=${TG_STATE_KMS_KEY_ARN_PRE_PROD:-}" >> "$GITHUB_ENV"
          echo "TG_STATE_KMS_KEY_ARN_PROD=${TG_STATE_KMS_KEY_ARN_PROD:-}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-apply-${{ matrix.environment }}-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Terragrunt
        shell: bash
        run: |
          set -euo pipefail
          TG_VERSION="1.0.1"
          curl -sSfL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt apply
        working-directory: environments/${{ matrix.environment }}/network
        run: |
          terragrunt run-all init --terragrunt-non-interactive
          terragrunt run-all apply --terragrunt-non-interactive
