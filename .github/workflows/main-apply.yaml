name: Main Apply

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: main-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - playground
          - nprod
          - pre-prod
          - prod

    environment: ${{ matrix.environment }}

    env:
      AWS_REGION: eu-central-1
      AWS_ACCOUNT_ID_ACCOUNT1: ${{ secrets.AWS_ACCOUNT_ID_ACCOUNT1 }}
      AWS_ACCOUNT_ID_ACCOUNT2: ${{ secrets.AWS_ACCOUNT_ID_ACCOUNT2 }}
      AWS_GITHUB_ROLE_NAME: ${{ secrets.AWS_GITHUB_ROLE_NAME }}
      DEPLOY_ACCOUNT_SCOPE: ${{ vars.DEPLOY_ACCOUNT_SCOPE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target account
        shell: bash
        run: |
          set -euo pipefail
          run_enabled="true"
          scope_raw="${DEPLOY_ACCOUNT_SCOPE:-both}"
          scope="$(echo "${scope_raw}" | tr '[:upper:]' '[:lower:]')"
          environment_account=""

          case "${{ matrix.environment }}" in
            playground|nprod)
              environment_account="1"
              account_id="${AWS_ACCOUNT_ID_ACCOUNT1:-}"
              ;;
            pre-prod|prod)
              environment_account="2"
              account_id="${AWS_ACCOUNT_ID_ACCOUNT2:-}"
              ;;
            *)
              echo "Unsupported environment: ${{ matrix.environment }}" >&2
              exit 1
              ;;
          esac

          case "${scope}" in
            1|2|both)
              ;;
            *)
              echo "Invalid DEPLOY_ACCOUNT_SCOPE: ${scope_raw}. Allowed values: 1, 2, both." >&2
              exit 1
              ;;
          esac

          if [[ -z "${AWS_GITHUB_ROLE_NAME}" ]]; then
            echo "Missing required repository secret: AWS_GITHUB_ROLE_NAME" >&2
            exit 1
          fi

          if [[ "${scope}" == "1" && "${environment_account}" == "2" ]]; then
            run_enabled="false"
            echo "Skipping ${{ matrix.environment }} because DEPLOY_ACCOUNT_SCOPE=1."
          fi

          if [[ "${scope}" == "2" && "${environment_account}" == "1" ]]; then
            run_enabled="false"
            echo "Skipping ${{ matrix.environment }} because DEPLOY_ACCOUNT_SCOPE=2."
          fi

          echo "RUN_ENABLED=${run_enabled}" >> "$GITHUB_ENV"
          if [[ "${run_enabled}" == "false" ]]; then
            exit 0
          fi

          if [[ -z "${account_id}" ]]; then
            if [[ "${environment_account}" == "1" ]]; then
              echo "Missing required repository secret for account 1 environments: AWS_ACCOUNT_ID_ACCOUNT1" >&2
            else
              echo "Missing required repository secret for account 2 environments: AWS_ACCOUNT_ID_ACCOUNT2" >&2
            fi
            exit 1
          fi

          echo "AWS_ACCOUNT_ID=${account_id}" >> "$GITHUB_ENV"
          echo "AWS_ROLE_TO_ASSUME=arn:aws:iam::${account_id}:role/${AWS_GITHUB_ROLE_NAME}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        if: env.RUN_ENABLED == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-apply-${{ matrix.environment }}-${{ github.run_id }}

      - name: Setup Terraform
        if: env.RUN_ENABLED == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Install Terragrunt
        if: env.RUN_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TG_VERSION="0.67.16"
          curl -sSfL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt apply
        if: env.RUN_ENABLED == 'true'
        working-directory: environments/${{ matrix.environment }}/network
        run: |
          terragrunt run-all init --terragrunt-non-interactive
          terragrunt run-all apply --terragrunt-non-interactive
