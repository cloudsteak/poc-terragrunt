name: PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - playground
          - nprod
          - pre-prod
          - prod

    env:
      AWS_REGION: eu-central-1
      AWS_ACCOUNT_ID_ACCOUNT1: ${{ vars.AWS_ACCOUNT_ID_ACCOUNT1 }}
      AWS_ACCOUNT_ID_ACCOUNT2: ${{ vars.AWS_ACCOUNT_ID_ACCOUNT2 }}
      AWS_GITHUB_ROLE_NAME: ${{ vars.AWS_GITHUB_ROLE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target account
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.environment }}" in
            playground|nprod)
              account_id="${AWS_ACCOUNT_ID_ACCOUNT1}"
              ;;
            pre-prod|prod)
              account_id="${AWS_ACCOUNT_ID_ACCOUNT2}"
              ;;
            *)
              echo "Unsupported environment: ${{ matrix.environment }}" >&2
              exit 1
              ;;
          esac

          if [[ -z "${account_id}" || -z "${AWS_GITHUB_ROLE_NAME}" ]]; then
            echo "Missing required repository variables: AWS_ACCOUNT_ID_ACCOUNT1, AWS_ACCOUNT_ID_ACCOUNT2, AWS_GITHUB_ROLE_NAME" >&2
            exit 1
          fi

          echo "AWS_ACCOUNT_ID=${account_id}" >> "$GITHUB_ENV"
          echo "AWS_ROLE_TO_ASSUME=arn:aws:iam::${account_id}:role/${AWS_GITHUB_ROLE_NAME}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-pr-${{ matrix.environment }}-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Terragrunt
        shell: bash
        run: |
          set -euo pipefail
          TG_VERSION="0.67.16"
          curl -sSfL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Install TFLint
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --version

      - name: Install Trivy
        shell: bash
        run: |
          set -euo pipefail
          TRIVY_VERSION="0.51.2"
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o trivy.tar.gz
          tar -xzf trivy.tar.gz trivy
          sudo mv trivy /usr/local/bin/trivy
          trivy --version

      - name: Terragrunt HCL format check
        run: terragrunt hclfmt --terragrunt-check --terragrunt-diff

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: TFLint init
        run: tflint --init

      - name: TFLint scan
        run: tflint --recursive

      - name: Trivy IaC scan
        run: trivy config --severity HIGH,CRITICAL --exit-code 1 .

      - name: Terragrunt plan
        working-directory: environments/${{ matrix.environment }}/network
        run: |
          terragrunt run-all init --terragrunt-non-interactive
          terragrunt run-all validate --terragrunt-non-interactive
          terragrunt run-all plan --terragrunt-non-interactive
